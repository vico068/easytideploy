# EasyDeploy PaaS - Production Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ===================
  # Infrastructure
  # ===================

  postgres:
    image: postgres:16-alpine
    container_name: easydeploy-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-easydeploy}
      POSTGRES_USER: ${DB_USERNAME:-easydeploy}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - easydeploy-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-easydeploy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: easydeploy-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - easydeploy-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  traefik:
    image: traefik:latest
    container_name: easydeploy-traefik
    restart: always
    environment:
      PANEL_DOMAIN: deploy.${DOMAIN}
      API_DOMAIN: api.${DOMAIN}
      TRAEFIK_DASHBOARD_DOMAIN: traefik.${DOMAIN}
      TRAEFIK_AUTH: ${TRAEFIK_AUTH}
    command:
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=WARN"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_dynamic:/etc/traefik/dynamic
      - ./proxy/dynamic/routes.yml:/etc/traefik/dynamic/routes.yml:ro
      - traefik_acme:/etc/traefik/acme
    networks:
      - easydeploy
      - easydeploy-internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ===================
  # Applications
  # ===================

  orchestrator:
    image: easydeploy/orchestrator:${VERSION:-latest}
    container_name: easydeploy-orchestrator
    restart: always
    environment:
      LISTEN_ADDR: ":8080"
      API_KEY: ${ORCHESTRATOR_API_KEY}
      DATABASE_URL: postgres://${DB_USERNAME:-easydeploy}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-easydeploy}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TRAEFIK_CONFIG_DIR: /etc/traefik/dynamic
      DOCKER_REGISTRY: ${DOCKER_REGISTRY}
      DATA_DIR: /var/lib/easydeploy
      APP_ENV: production
      ACME_ENABLED: "true"
      ACME_EMAIL: ${ACME_EMAIL}
      ACME_STAGING: "false"
    volumes:
      - orchestrator_data:/var/lib/easydeploy
      - traefik_dynamic:/etc/traefik/dynamic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydeploy
      - easydeploy-internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  panel:
    image: easydeploy/panel:${VERSION:-latest}
    container_name: easydeploy-panel
    restart: always
    environment:
      APP_NAME: EasyDeploy
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: https://deploy.${DOMAIN}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-easydeploy}
      DB_USERNAME: ${DB_USERNAME:-easydeploy}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      EASYDEPLOY_ORCHESTRATOR_URL: http://orchestrator:8080
      EASYDEPLOY_API_KEY: ${ORCHESTRATOR_API_KEY}
    volumes:
      - ./panel/app:/var/www/html/app
      - ./panel/config:/var/www/html/config
      - ./panel/database:/var/www/html/database
      - ./panel/resources:/var/www/html/resources
      - ./panel/routes:/var/www/html/routes
      - ./panel/bootstrap:/var/www/html/bootstrap
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydeploy
      - easydeploy-internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  queue-worker:
    image: easydeploy/panel:${VERSION:-latest}
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-easydeploy}
      DB_USERNAME: ${DB_USERNAME:-easydeploy}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      EASYDEPLOY_ORCHESTRATOR_URL: http://orchestrator:8080
      EASYDEPLOY_API_KEY: ${ORCHESTRATOR_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydeploy-internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
      replicas: 2

  scheduler:
    image: easydeploy/panel:${VERSION:-latest}
    container_name: easydeploy-scheduler
    restart: always
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-easydeploy}
      DB_USERNAME: ${DB_USERNAME:-easydeploy}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      EASYDEPLOY_ORCHESTRATOR_URL: http://orchestrator:8080
      EASYDEPLOY_API_KEY: ${ORCHESTRATOR_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydeploy-internal
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

networks:
  easydeploy:
    driver: bridge
  easydeploy-internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  orchestrator_data:
  traefik_dynamic:
  traefik_acme:
